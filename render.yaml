services:
  - type: web
    name: my-church-backend
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: free
    region: frankfurt
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: church-db
          property: connectionString
      - key: PORT
        value: 3000

databases:
  - name: church-db
    databaseName: church_db
    user: church_admin
    plan: free
    region: frankfurt
